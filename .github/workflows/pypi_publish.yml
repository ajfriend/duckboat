name: build

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    name: Build & Inspect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hynek/build-and-inspect-python-package@v2

  test-wheel:
    name: Test Wheel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - name: Test wheel
        run: |
          uv venv
          uv pip install "dist/duckboat-*-py3-none-any.whl[testing]"
          .venv/bin/pytest

  to_pypi:
    needs: [build, test-wheel]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
